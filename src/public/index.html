<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Gestión de Productos</h1>
        
        <section class="card">
            <h2>Añadir un Nuevo Producto</h2>
            <form id="product-form">
                <div class="form-group">
                    <input type="text" id="name" placeholder="Nombre del producto" required>
                </div>
                <div class="form-group">
                    <input type="number" id="cantidad" placeholder="Cantidad" required>
                </div>
                <div class="form-group">
                    <input type="number" step="0.01" id="precio" placeholder="Precio" required>
                </div>
                <button type="submit" class="btn-primary">Guardar Producto</button>
            </form>
        </section>

        <section class="card">
            <h2>Lista de Productos</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="search-name" placeholder="Buscar por nombre...">
                <button id="btn-search" class="btn-primary">Buscar</button>
                <button id="btn-reload" class="btn-secondary">Mostrar Todos</button>
            </div>
            
            <ul id="product-list"></ul>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
